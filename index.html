<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Currículos para Qwen 7B</title>
</head>

<body>
    <h1>Recrutador com IA</h1>

    <p>
        <strong>1. Informe o Link do Ngrok gerado no Colab:</strong><br>
        <input type="text" id="linkApi" value="https://lillianna-unhogged-nelida.ngrok-free.dev/parse_curriculo/"
            style="width: 400px;">
    </p>

    <p>
        <strong>2. Selecione o Currículo (PDF):</strong><br>
        <input type="file" id="arquivoPdf" accept="application/pdf">
    </p>

    <p>
        <button onclick="enviarCurriculo()">Enviar para o Colab</button>
    </p>

    <hr>

    <h3>Status / Resultado JSON:</h3>
    <p id="status_mensagem" style="color: blue;">Aguardando envio...</p>
    <button id="btnBaixar"
        style="display: none; margin-bottom: 15px; padding: 8px 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px;"
        onclick="baixarJson()"> Baixar JSON</button>

    <pre id="caixaResultado"
        style="background: #f4f4f4; padding: 10px; border: 1px solid #ccc; max-width: 800px; overflow: auto; min-height: 200px;">
    Nenhum JSON recebido ainda.
    </pre>

    <script>
        async function enviarCurriculo() {
            // Pega os elementos da tela
            const inputLink = document.getElementById("linkApi").value;
            const inputFile = document.getElementById("arquivoPdf");
            const status_mensagem = document.getElementById("status_mensagem");
            const caixaResultado = document.getElementById("caixaResultado");

            // Validações básicas
            if (!inputLink.trim()) {
                alert("Por favor, cole o link lá do Ngrok/Colab primeiro!");
                return;
            }
            if (!inputFile.files || inputFile.files.length === 0) {
                alert("Por favor, selecione um arquivo PDF do seu computador.");
                return;
            }

            const arquivoDaTela = inputFile.files[0];

            // Monta o "pacote" form-data exato que o FastAPI do Python espera
            const formData = new FormData();
            formData.append("arquivo", arquivoDaTela);

            try {
                // Atualiza a tela avisando que está pensando
                status_mensagem.innerText = "Enviando para a IA no Google Colab... (Pode demorar 2-5 minutos)";
                status_mensagem.style.color = "orange";
                caixaResultado.innerText = "Carregando...";

                // Faz o envio (POST request) -> Lembrando, Colab precisa de CORSMiddleware habilitado
                const resposta = await fetch(inputLink, {
                    method: "POST",
                    body: formData
                });

                if (resposta.ok) {
                    const jsonPronto = await resposta.json();

                    // Sucesso! Mostra na tela bonito formatando o JSON com espaçamento 2
                    status_mensagem.innerText = "SUCESSO.";
                    status_mensagem.style.color = "green";
                    caixaResultado.innerText = JSON.stringify(jsonPronto, null, 2);

                    // Guarda o JSON para o botão Download e o exibe
                    window.ultimoJson = jsonPronto;
                    document.getElementById("btnBaixar").style.display = "inline-block";

                } else {
                    status_mensagem.innerText = "ERRO na chamada.";
                    status_mensagem.style.color = "red";
                    caixaResultado.innerText = `Status falho da API: ${resposta.status}`;
                }

            } catch (erro) {
                status_mensagem.innerText = "Falha";
                status_mensagem.style.color = "red";
                caixaResultado.innerText = `Ocorreu um erro de rede (ou erro de CORS não habilitado no Python): \n${erro}`;
                console.error("Erro Fetch: ", erro);
            }
        }

        function baixarJson() {
            if (!window.ultimoJson) return;

            // Transforma o JSON em um Arquivo Virtual (Blob)
            const jsonString = JSON.stringify(window.ultimoJson, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            // Cria um link invisível e clica nele para baixar
            const a = document.createElement('a');
            a.href = url;
            a.download = "curriculo_processado.json";
            document.body.appendChild(a);
            a.click();

            // Limpa o link
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
